openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: exam
    description: Exam operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /exam/questions:
    get:
      operationId: getExamQuestions
      tags: [exam]
      summary: Get all exam questions
      description: Returns extracted exam questions from the PDF
      responses:
        "200":
          description: Questions retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamQuestionsResponse"
  /exam/status:
    get:
      operationId: getExamStatus
      tags: [exam]
      summary: Get exam extraction status
      description: Returns the status of PDF extraction process
      responses:
        "200":
          description: Status retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ExamQuestion:
      type: object
      properties:
        id:
          type: number
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: string
          nullable: true
        examIndex:
          type: number
      required:
        - id
        - question
        - options
        - correctAnswer
        - examIndex
    ExamQuestionsResponse:
      type: object
      properties:
        exams:
          type: array
          items:
            $ref: "#/components/schemas/ExamSection"
        totalQuestions:
          type: number
      required:
        - exams
        - totalQuestions
    ExamSection:
      type: object
      properties:
        title:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/ExamQuestion"
      required:
        - title
        - questions
    ExamStatus:
      type: object
      properties:
        ready:
          type: boolean
        processing:
          type: boolean
        totalPages:
          type: number
        processedPages:
          type: number
        error:
          type: string
          nullable: true
      required:
        - ready
        - processing
        - totalPages
        - processedPages
        - error
